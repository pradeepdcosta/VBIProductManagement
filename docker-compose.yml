services:
  postgres:
    image: postgres:16-alpine
    ports:
      - '5433:5432'
    environment:
      POSTGRES_USER: vbi
      POSTGRES_PASSWORD: vbipass123
      POSTGRES_DB: vbi_products
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vbi -d vbi_products']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
