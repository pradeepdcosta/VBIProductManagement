apiVersion: apps/v1
kind: Deployment
metadata:
  name: vbi-product-portal
  labels:
    app: vbi-product-portal
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vbi-product-portal
  template:
    metadata:
      labels:
        app: vbi-product-portal
    spec:
      containers:
        - name: vbi-product-portal
          image: vbi-product-portal:latest
          ports:
            - containerPort: 3001
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: vbi-product-portal-secrets
                  key: database-url
            - name: NODE_ENV
              value: production
            - name: API_PORT
              value: '3001'
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: '128Mi'
              cpu: '100m'
            limits:
              memory: '256Mi'
              cpu: '250m'
